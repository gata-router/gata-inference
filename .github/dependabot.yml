version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: daily
      time: "02:34"
      timezone: "Australia/Melbourne"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    groups:
      qa:
        patterns:
          - "ruff*"
          - "ty*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:45"
      timezone: "Australia/Melbourne"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 1